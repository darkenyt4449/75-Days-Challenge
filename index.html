<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>75 Day Challenge</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main StyleSheet -->
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1 id="app-title" contenteditable="true" spellcheck="false">75 Days Challenge</h1>
            <p class="subtitle">Click the title to edit</p>
        </div>
        <div class="header-controls">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-sun" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
            <button id="reset-btn" class="btn btn-outline">Reset App</button>
        </div>
    </header>

    <main class="container">
        <!-- Setup View Container -->
        <div id="setup-view" class="setup-view">
            <h2>Challenge Setup</h2>
            <p class="setup-subtitle">Configure your tasks for each day of the week.</p>
            
            <div class="setup-group">
                <label for="start-date" class="setup-label">Start Date</label>
                <input type="date" id="start-date" class="setup-input" required>
            </div>

            <div id="days-config-container" class="days-config-container">
                <!-- Dynamically generated Day Configuration Blocks go here -->
            </div>

            <button id="start-challenge-btn" class="btn btn-primary">Start Challenge</button>
        </div>

        <!-- 75 Days Grid Container (hidden by default) -->
        <div id="main-view" class="main-view" style="display: none;">
            <div id="days-grid" class="days-grid"></div>
        </div>
    </main>

    <!-- Modal for Sub-habits -->
    <div id="day-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-day-title">Day X</h2>
            <p class="modal-subtitle">Complete your daily goals to check off this day.</p>
            <div class="habits-list" id="modal-habits-list">
                <!-- Dynamic Tasks go here -->
            </div>
            <p id="modal-status-text" class="modal-status-text"></p>
            <button id="save-day-btn" class="btn btn-primary">Save Progress</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
